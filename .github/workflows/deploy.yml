name: CI/CD Pipeline - Vercel Deploy

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------
  # ETAPA DE QUALIDADE: LINT & TESTS (FRONTEND & BACKEND)
  # ---------------------------------------------------------
  quality-checks:
    name: Code Quality (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão LTS recomendada
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (Backend)
        run: npm run lint --workspace=backend

      - name: Run Linter (Frontend)
        run: npm run lint --workspace=frontend

      # Geramos o Prisma Schema antes de testar/buildar o backend
      - name: Generate Prisma Client (Backend)
        run: npm run prisma:generate --workspace=backend

      - name: Run Unit Tests (Backend)
        run: npm run test --workspace=backend

      - name: Run Unit Tests (Frontend)
        run: npm run test --workspace=frontend

  # ---------------------------------------------------------
  # ETAPA DE BUILD E DEPLOY: FRONTEND
  # ---------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: quality-checks
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Secrets Are Set
        run: |
          echo "VERCEL_ORG_ID length: ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"
          if [ -z "$VERCEL_ORG_ID" ]; then echo "❌ VERCEL_ORG_ID is EMPTY"; exit 1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "❌ VERCEL_PROJECT_ID_FRONTEND is EMPTY"; exit 1; fi
          if [ -z "$VERCEL_TOKEN" ]; then echo "❌ VERCEL_TOKEN is EMPTY"; exit 1; fi
          echo "✅ All secrets are set"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: apps/frontend

  # ---------------------------------------------------------
  # ETAPA DE BUILD E DEPLOY: BACKEND
  # ---------------------------------------------------------
  deploy-backend:
    name: Deploy Backend (Vercel)
    needs: quality-checks
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Secrets Are Set
        run: |
          echo "VERCEL_ORG_ID length: ${#VERCEL_ORG_ID}"
          echo "VERCEL_PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "VERCEL_TOKEN length: ${#VERCEL_TOKEN}"
          if [ -z "$VERCEL_ORG_ID" ]; then echo "❌ VERCEL_ORG_ID is EMPTY"; exit 1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "❌ VERCEL_PROJECT_ID_BACKEND is EMPTY"; exit 1; fi
          if [ -z "$VERCEL_TOKEN" ]; then echo "❌ VERCEL_TOKEN is EMPTY"; exit 1; fi
          echo "✅ All secrets are set"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/backend

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/backend

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/backend

  # ---------------------------------------------------------
  # ETAPA FINAL: NOTIFICAÇÃO (OPCIONAL/MOCK)
  # ---------------------------------------------------------
  notify:
    name: Notification Status
    needs: [deploy-frontend, deploy-backend]
    if: always() # Roda mesmo se os steps anteriores falharem
    runs-on: ubuntu-latest
    steps:
      - name: Report Deploy Status
        run: |
          echo "### Resumo da Execução de CI/CD 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Status do Deploy Frontend: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Status do Deploy Backend: ${{ needs.deploy-backend.result }}" >> $GITHUB_STEP_SUMMARY
