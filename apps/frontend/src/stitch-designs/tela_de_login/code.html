<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Caixa Invisível</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8B5CF6", // Amethyst
                        "on-primary": "#FFFFFF",
                        "background": "#050514", // Deep Void
                        "surface": "#0C0C24", // Deep Navy
                        "on-surface": "#F1F5F9",
                        "on-surface-variant": "#94A3B8",
                        "surface-container-low": "#161632",
                        "surface-container-highest": "#1E1E45",
                        "outline": "#334155",
                        "outline-variant": "#475569",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', sans-serif;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .celestial-gradient {
            background: linear-gradient(135deg, #312E81 0%, #4338CA 35%, #7C3AED 70%, #C084FC 100%);
            background-size: 200% 200%;
        }
        .cosmic-surface {
            background: linear-gradient(160deg, #0C0C24 0%, #161632 100%);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }
        .star-glow {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary/30">
<main class="w-full max-w-[440px] flex flex-col items-center z-10">
<header class="w-full mb-12 flex flex-col items-start">
<div class="flex items-center gap-3 mb-8">
<div class="celestial-gradient w-10 h-10 rounded-lg flex items-center justify-center shadow-lg star-glow">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline text-xl font-extrabold tracking-tighter text-on-surface">Caixa Invisível</h1>
</div>
<h2 class="font-headline text-[2.5rem] leading-tight font-bold text-on-surface tracking-tight">
            Editorial Finance.
        </h2>
<p class="text-on-surface-variant font-medium mt-2">Acesse sua transparência financeira.</p>
</header>
<div class="w-full cosmic-surface rounded-xl p-8 shadow-2xl backdrop-blur-sm">
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline/30 focus:border-primary/50 focus:ring-2 focus:ring-primary/20 rounded-lg py-3 px-4 text-on-surface font-body transition-all outline-none placeholder:text-slate-600" id="email" placeholder="nome@exemplo.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-sm font-medium text-on-surface-variant" for="password">Senha</label>
<a class="text-xs font-semibold text-primary hover:text-purple-300 transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline/30 focus:border-primary/50 focus:ring-2 focus:ring-primary/20 rounded-lg py-3 px-4 text-on-surface font-body transition-all outline-none placeholder:text-slate-600" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full celestial-gradient text-white font-bold py-4 rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:shadow-primary/40" type="submit">
                Entrar
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline/20"></div>
<span class="mx-4 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">OU</span>
<div class="flex-grow border-t border-outline/20"></div>
</div>
<button class="w-full bg-surface-container-highest/50 hover:bg-surface-container-highest text-on-surface font-semibold py-4 rounded-lg border border-outline/20 active:scale-[0.98] transition-all" type="button">
            Criar conta
        </button>
</div>
<footer class="mt-12 text-center">
<div class="flex items-center justify-center gap-6 opacity-30 hover:opacity-70 transition-opacity">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Segurança Nível Bancário</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Suporte 24/7</span>
</div>
<div class="fixed top-0 right-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] rounded-full celestial-gradient opacity-20 blur-[140px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[600px] h-[600px] rounded-full bg-indigo-900/20 opacity-20 blur-[120px]"></div>
</div>
</footer>
</main>
<div class="hidden lg:block fixed left-12 bottom-12 max-w-xs z-20">
<div class="p-6 bg-surface-container-low/40 backdrop-blur-xl border border-primary/10 rounded-2xl shadow-2xl">
<span class="material-symbols-outlined text-primary mb-4 block" style="font-variation-settings: 'FILL' 1;">insights</span>
<p class="font-headline text-lg font-bold text-on-surface leading-tight">
            "A clareza financeira é o primeiro passo para a liberdade invisível."
        </p>
<p class="text-xs font-medium text-on-surface-variant mt-3 uppercase tracking-widest">Relatório Editorial 2024</p>
</div>
</div>

</body></html>
